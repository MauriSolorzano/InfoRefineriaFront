<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Gestión</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css">
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <div class="header-left">
    <div class="header-logo">
      <span class="label">Cartelería</span>
      <span class="title">Panel de Gestión</span>
    </div>
    <div class="header-divider"></div>
    <div class="header-planta" id="headerPlanta">—</div>
  </div>
  <div class="header-right">
    <div class="user-chip">
      <div class="user-avatar" id="userAvatar">U</div>
      <span id="userUsername">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<!-- ─── MAIN ─── -->
<main>
  <div id="appContainer">
    <div class="loading-state">Cargando sectores...</div>
  </div>
</main>

<!-- ─── CONFIRM MODAL ─── -->
<div class="modal-overlay" id="modalConfirm">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">¿Eliminar imagen?</div>
    <div class="modal-sub">Esta acción no se puede deshacer.</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cerrarConfirm()">Cancelar</button>
      <button class="btn btn-danger-solid" onclick="confirmarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div id="toast-container"></div>

<script>
const BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? "http://localhost:8080" 
    : "https://10.0.0.50";
let sectoresData = [];
let sectorActivo = null;
let imagenAEliminar = null;

// ─── HELPERS ───
function getToken()    { return localStorage.getItem('token'); }
function getUsername() { return localStorage.getItem('username') || '?'; }
function getPlanta() { return localStorage.getItem('plantaID') || ''; }
function getNombrePlanta() { return localStorage.getItem('nombrePlanta') || '—'; }

function fetchPanel(url, opts = {}) {
  const isFormData = opts.body instanceof FormData;
  return fetch(BASE_URL + url, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${getToken()}`,
      ...(isFormData ? {} : { 'Content-Type': 'application/json' }),
      ...opts.headers
    }
  });
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── INIT ───
document.addEventListener('DOMContentLoaded', async () => {
  const token = getToken();
  const rol = localStorage.getItem('rol');

  if (!token || rol !== 'ADMIN_PLANTA') {
    window.location.href = 'login.html';
    return;
  }

  const username = getUsername();
  document.getElementById('userUsername').textContent = username;
  document.getElementById('userAvatar').textContent = username[0].toUpperCase();
  document.getElementById('headerPlanta').textContent = getNombrePlanta();

  await cargarSectores();
});

// ─── CARGAR SECTORES ───
async function cargarSectores() {
  const planta = getPlanta();
  try {
    const res = await fetchPanel(`/api/plantas/${planta}/sectores`);
    if (!res.ok) throw new Error();
    sectoresData = await res.json();
    renderApp();
  } catch (e) {
    document.getElementById('appContainer').innerHTML = `
      <div class="no-sectores">
        <div class="no-sectores-icon">⚠️</div>
        <div class="no-sectores-title">Error al cargar sectores</div>
        <div class="no-sectores-sub">Verificá tu conexión e intentá de nuevo.</div>
      </div>`;
  }
}

// ─── RENDER PRINCIPAL ───
function renderApp() {
  const container = document.getElementById('appContainer');

  if (!sectoresData.length) {
    container.innerHTML = `
      <div class="no-sectores">
        <div class="no-sectores-icon">📂</div>
        <div class="no-sectores-title">Sin sectores asignados</div>
        <div class="no-sectores-sub">Contactá al administrador para que te asigne sectores.</div>
      </div>`;
    return;
  }

  // Tabs
  const tabsHTML = sectoresData.map((s, i) => `
    <div class="sector-tab ${i === 0 ? 'active' : ''}"
         onclick="cambiarSector('${s.nombre}', this)">
      ${s.nombreDisplay}
    </div>
  `).join('');

  // Panels
  const panelsHTML = sectoresData.map((s, i) => `
    <div class="sector-panel ${i === 0 ? 'active' : ''}" id="panel-${s.nombre}">

      <div class="card">
        <div class="card-header">
          <div class="card-title">⬆️ Subir imagen</div>
        </div>
        <div class="card-body">
          <div class="upload-zone"
               id="zone-${s.nombre}"
               onclick="document.getElementById('input-${s.nombre}').click()"
               ondragover="onDragOver(event, '${s.nombre}')"
               ondragleave="onDragLeave('${s.nombre}')"
               ondrop="onDrop(event, '${s.nombre}')">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Hacé click o arrastrá una imagen</div>
            <div class="upload-hint">JPG, PNG, GIF, WEBP — máx. 10MB</div>
          </div>
          <input type="file" id="input-${s.nombre}" accept="image/*"
                 style="display:none" onchange="subirImagen('${s.nombre}', this)">
          <div class="upload-progress" id="progress-${s.nombre}">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="progressbar-${s.nombre}"></div>
            </div>
            <div class="progress-text" id="progresstext-${s.nombre}">Subiendo...</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">🖼️ Imágenes del sector</div>
          <span class="badge badge-accent" id="counter-${s.nombre}"></span>
        </div>
        <div class="card-body">
          <div id="galeria-${s.nombre}">
            <div class="loading-state">Cargando imágenes...</div>
          </div>
        </div>
      </div>

    </div>
  `).join('');

  container.innerHTML = `
    <div class="sectores-header">
      <div class="sectores-title">Mis sectores</div>
      <div class="sector-tabs">${tabsHTML}</div>
    </div>
    ${panelsHTML}
  `;

  // Cargar imágenes del primer sector
  if (sectoresData.length > 0) {
    sectorActivo = sectoresData[0].nombre;
    cargarImagenes(sectoresData[0].nombre);
  }
}

// ─── CAMBIAR SECTOR TAB ───
function cambiarSector(nombre, tabEl) {
  // Tabs
  document.querySelectorAll('.sector-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');

  // Panels
  document.querySelectorAll('.sector-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${nombre}`).classList.add('active');

  sectorActivo = nombre;

  // Cargar imágenes si no se cargaron aún
  const galeria = document.getElementById(`galeria-${nombre}`);
  if (galeria && galeria.querySelector('.loading-state')) {
    cargarImagenes(nombre);
  }
}

// ─── CARGAR IMÁGENES ───
async function cargarImagenes(sector) {
  const planta = getPlanta();
  const galeria = document.getElementById(`galeria-${sector}`);
  const counter = document.getElementById(`counter-${sector}`);

  try {
    const res = await fetchPanel(`/api/imagenes/${sector}?planta=${planta}`);
    if (!res.ok) throw new Error();
    const imagenes = await res.json();
    renderGaleria(sector, imagenes);
    counter.textContent = imagenes.length ? `${imagenes.length} imagen${imagenes.length !== 1 ? 'es' : ''}` : '';
  } catch (e) {
    galeria.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Error al cargar imágenes</div></div>`;
  }
}

// ─── RENDER GALERÍA ───
function renderGaleria(sector, imagenes) {
  console.log('Primera imagen:', JSON.stringify(imagenes[0]));
  const galeria = document.getElementById(`galeria-${sector}`);

  if (!imagenes.length) {
    galeria.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🖼️</div>
        <div class="empty-text">No hay imágenes en este sector todavía</div>
      </div>`;
    return;
  }

  galeria.innerHTML = `<div class="image-grid">${imagenes.map(img => `
    <div class="image-card" id="img-card-${img.id}">
      <img class="image-thumb"
           src="${img.urlPublica}"
           alt="${img.nombreArchivo}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="image-thumb-placeholder" style="display:none">📄</div>
      <div class="image-footer">
        <span class="image-name" title="${img.nombreArchivo}">${img.nombreArchivo}</span>
        <button class="btn-delete" onclick="pedirConfirmacion(${img.id}, '${sector}')" title="Eliminar">🗑️</button>
      </div>
    </div>
  `).join('')}</div>`;
}

// ─── SUBIR IMAGEN ───
async function subirImagen(sector, input) {
  const archivo = input.files[0];
  if (!archivo) return;

  if (archivo.size > 10 * 1024 * 1024) {
    toast('El archivo supera los 10MB', 'error');
    input.value = '';
    return;
  }

  const planta = getPlanta();
  const progress = document.getElementById(`progress-${sector}`);
  const progressBar = document.getElementById(`progressbar-${sector}`);
  const progressText = document.getElementById(`progresstext-${sector}`);
  const zone = document.getElementById(`zone-${sector}`);

  // Mostrar progress
  progress.style.display = 'block';
  zone.style.pointerEvents = 'none';
  zone.style.opacity = '0.5';

  // Animación falsa de progreso (no tenemos XHR con progreso real)
  let pct = 0;
  const interval = setInterval(() => {
    pct = Math.min(pct + Math.random() * 15, 85);
    progressBar.style.width = pct + '%';
    progressText.textContent = `Subiendo... ${Math.round(pct)}%`;
  }, 200);

  const formData = new FormData();
  formData.append('imagen', archivo);
  formData.append('sector', sector);
  formData.append('planta', planta);

  try {
    const res = await fetchPanel('/api/imagenes', { method: 'POST', body: formData });
    clearInterval(interval);

    if (!res.ok) throw new Error();

    progressBar.style.width = '100%';
    progressText.textContent = '¡Listo!';

    setTimeout(() => {
      progress.style.display = 'none';
      progressBar.style.width = '0%';
      zone.style.pointerEvents = '';
      zone.style.opacity = '';
      input.value = '';
    }, 600);

    toast('Imagen subida correctamente', 'success');
    await cargarImagenes(sector);

  } catch (e) {
    clearInterval(interval);
    progress.style.display = 'none';
    zone.style.pointerEvents = '';
    zone.style.opacity = '';
    input.value = '';
    toast('Error al subir la imagen', 'error');
  }
}

// ─── DRAG & DROP ───
function onDragOver(e, sector) {
  e.preventDefault();
  document.getElementById(`zone-${sector}`).classList.add('dragover');
}

function onDragLeave(sector) {
  document.getElementById(`zone-${sector}`).classList.remove('dragover');
}

function onDrop(e, sector) {
  e.preventDefault();
  document.getElementById(`zone-${sector}`).classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const input = document.getElementById(`input-${sector}`);
  // Simular selección de archivo
  const dt = new DataTransfer();
  dt.items.add(file);
  input.files = dt.files;
  subirImagen(sector, input);
}

// ─── ELIMINAR ───
let sectorEliminar = null;

function pedirConfirmacion(imagenId, sector) {
  imagenAEliminar = imagenId;
  sectorEliminar = sector;
  document.getElementById('modalConfirm').classList.add('open');
}

function cerrarConfirm() {
  imagenAEliminar = null;
  sectorEliminar = null;
  document.getElementById('modalConfirm').classList.remove('open');
}

async function confirmarEliminar() {
  if (!imagenAEliminar) return;
  cerrarConfirm();

  try {
    const res = await fetchPanel(`/api/imagenes/${imagenAEliminar}`, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    toast('Imagen eliminada', 'success');
    await cargarImagenes(sectorEliminar);
  } catch (e) {
    toast('Error al eliminar la imagen', 'error');
  }
}

// ─── LOGOUT ───
function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
