<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema Carrusel</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="login-container">
      <img src="img/logo.png" alt="Refinería del Centro" class="logo" />
      <form class="login-form" id="loginForm">
        <h2>Bienvenido</h2>
        <p class="subtitle">Inicia sesión en tu cuenta</p>

        <div class="error-message" id="errorMessage"></div>

        <div class="input-group">
          <input
            type="text"
            name="username"
            placeholder="Usuario"
            required
            autocomplete="username"
          />
        </div>

        <div class="input-group">
          <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-button" id="loginButton">
          <span id="buttonText">Iniciar Sesión</span>
        </button>
      </form>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? "http://localhost:8080" 
        : "http://10.0.0.50:8080";

        const form = document.getElementById("loginForm");
        const button = document.getElementById("loginButton");
        const buttonText = document.getElementById("buttonText");
        const errorMessage = document.getElementById("errorMessage");

        // Función para mostrar error
        function showError(message) {
          errorMessage.textContent = message;
          errorMessage.style.display = "block";
          setTimeout(() => {
            errorMessage.style.display = "none";
          }, 5000);
        }

        // Función para mostrar estado de carga
        function setLoading(loading) {
          if (loading) {
            button.disabled = true;
            buttonText.innerHTML =
              '<span class="loading"></span>Iniciando sesión...';
          } else {
            button.disabled = false;
            buttonText.textContent = "Iniciar Sesión";
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          const username = form.username.value.trim();
          const password = form.password.value.trim();

          if (!username || !password) {
            showError("Por favor, completa todos los campos");
            return;
          }

          setLoading(true);
          errorMessage.style.display = "none";

          try {
            const response = await fetch(`${BASE_URL}/api/auth`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({
                username: username,
                password: password,
              }),
            });

            if (response.ok) {
              const data = await response.json();

              localStorage.setItem("token", data.token);
              localStorage.setItem("plantaID", data.planta);
              localStorage.setItem("nombrePlanta", data.nombrePlanta);
              localStorage.setItem("rol", data.rol);
              localStorage.setItem("username", data.username);

              if (data.rol === "SUPERADMIN") {
                window.location.href = "admin.html";
              } else if (data.rol === "ADMIN_PLANTA") {
                window.location.href = "panel.html";
              } else if (data.rol === "VISOR") {
                console.log('Token a usar:', data.token ? 'existe' : 'NULL');
                console.log('Haciendo fetch a mis-sectores...');

                const resSectores = await fetch(
                  `${BASE_URL}/api/visor/mis-sectores`,
                  {
                    headers: { Authorization: `Bearer ${data.token}` },
                  },
                );
                console.log('Respuesta mis-sectores status:', resSectores.status);
                console.log('Respuesta mis-sectores headers:', [...resSectores.headers.entries()]);
                const sectores = await resSectores.json();

                if (!sectores.length) {
                  showError(
                    "No tenés sectores asignados. Contactá al administrador.",
                  );
                  setLoading(false);
                  return;
                }

                // Guardar el primer sector asignado
                const sector = sectores[0];
                localStorage.setItem("sector", sector.nombre);
                localStorage.setItem("sectorDisplay", sector.nombreDisplay);

                window.location.href = `visor.html?sector=${sector.nombre}&planta=${data.planta}`;
              }
            } else {
              const errorData = await response.json().catch(() => ({}));
              showError(
                errorData.message || "Usuario o contraseña incorrectos",
              );
            }
          } catch (error) {
            console.log("Error al iniciar sesión:", error);
            showError("Error de conexión. Por favor, inténtalo de nuevo.");
          } finally {
            setLoading(false);
          }
        });

        // Limpiar mensajes de error cuando el usuario empiece a escribir
        const inputs = form.querySelectorAll("input");
        inputs.forEach((input) => {
          input.addEventListener("input", () => {
            errorMessage.style.display = "none";
          });
        });
      });
    </script>
  </body>
</html>
